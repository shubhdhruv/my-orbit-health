name = "my-orbit-health"
account_id = "5e602c6fafc8da19fc415f90771e1f2a"  # Shubh's account (Shubh@myorbithealth.com)
main = "src/worker/index.ts"
compatibility_date = "2024-09-09"
workers_dev = true

[vars]
ENVIRONMENT = "production"
STRIPE_BYPASS = "false"
MEDPLUM_BASE_URL = "https://api.medplum.com"

[[kv_namespaces]]
binding = "PARTNERS"
id = "92bb2fea9284478ba3ce1438ca0898b3"

[[r2_buckets]]
binding = "BLOODWORK_R2"
bucket_name = "moh-bloodwork"

[assets]
directory = "./public"
binding = "ASSETS"

[[routes]]
pattern = "onboard.myorbithealth.com/*"
zone_name = "myorbithealth.com"

# Patient portal — fallback subdomain on the MOH zone so the portal is
# reachable before any client DNS is live. Per-brand vanity subdomains
# (e.g. portal.kingdomlongevitylabs.com) are added as CNAMEs to this
# Worker. To register a new client subdomain, add another [[routes]]
# entry below with `zone_name` (if DNS is on Cloudflare under this
# account) or configure it as a Workers Custom Domain in the dashboard.
[[routes]]
pattern = "portal.myorbithealth.com/*"
zone_name = "myorbithealth.com"

[triggers]
crons = ["0 14 * * *"]  # Run daily at 2pm UTC (7am PT / 10am ET)

# Secrets (set via `wrangler secret put`):
# HEALTHIE_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# MEDPLUM_CLIENT_ID
# MEDPLUM_CLIENT_SECRET
# DOCTOR_PRACTITIONER_ID

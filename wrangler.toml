name = "my-orbit-health"
main = "src/worker/index.ts"
compatibility_date = "2024-09-09"
workers_dev = true

[vars]
ENVIRONMENT = "production"
STRIPE_BYPASS = "true"
MEDPLUM_BASE_URL = "https://api.medplum.com"

[[kv_namespaces]]
binding = "PARTNERS"
id = "92bb2fea9284478ba3ce1438ca0898b3"

[site]
bucket = "./public"

[[routes]]
pattern = "onboard.myorbithealth.com/*"
zone_name = "myorbithealth.com"

# Secrets (set via `wrangler secret put`):
# HEALTHIE_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# MEDPLUM_CLIENT_ID
# MEDPLUM_CLIENT_SECRET
# DOCTOR_PRACTITIONER_ID
